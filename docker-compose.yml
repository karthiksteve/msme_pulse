version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: msme_pulse_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-msme_pulse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-msme_pulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: msme_pulse_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── FastAPI Backend ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.backend
    container_name: msme_pulse_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-msme_pulse}
      REDIS_URL: redis://redis:6379/0
      MODEL_PATH: /app/models
      DEBUG: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models:ro   # mount ONNX models as read-only
      - ./synthetic_data:/app/synthetic_data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── React Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: deployment/Dockerfile.frontend
    container_name: msme_pulse_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
